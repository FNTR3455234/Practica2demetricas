name: Pruebas E2E cal.diy
on: [push, pull_request]
jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      HEADLESS: "1"          # Chrome sin ventana (servidor sin pantalla)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest --cov=pages --cov-report=xml --html=reporte.html --self-contained-html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evidencias
          path: |
            reporte.html
            coverage.xml
