# Configuracion de SonarQube para el proyecto de pruebas cal.diy (Practica 2).
# El scanner lee este archivo desde la raiz del proyecto (practica2_caldiy/).

sonar.projectKey=caldiy-pruebas
sonar.projectName=Cal.diy Pruebas E2E
# Se analizan DOS conjuntos de fuentes:
#   pages/         -> Page Objects de Selenium + utils.py (Python)
#   packages/lib/  -> módulos REALES (acortados) del repo cal.diy (TypeScript)
# Así el analisis cubre codigo real del proyecto de la Unidad 1 (multi-lenguaje).
sonar.sources=pages,packages/lib
sonar.tests=tests
sonar.python.version=3.12
# Codificacion de los archivos fuente
sonar.sourceEncoding=UTF-8

# La URL del servidor y el TOKEN NO se escriben aqui (mala practica).
# Se pasan por variable de entorno desde los scripts de sonarqube/:
#   SONAR_HOST_URL  y  SONAR_TOKEN   (ver sonarqube/README.md)

# Cobertura conectada desde pytest-cov (Parte B). Genera coverage.xml con:
#   pytest --cov=pages --cov-report=xml
sonar.python.coverage.reportPaths=coverage.xml
